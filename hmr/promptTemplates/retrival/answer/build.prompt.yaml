title: 检索回答提示词模板
author: LACpara
email: 2797157434@qq.com
last_modified: 2026-06-16
version: 1.0
tags: []
description: 基于 Reader 知识回答问题，可部分回答
param:
  question:
    _type: str
    _desc: 用户问题
  knowledge:
    _type: dict
    _desc: Reader 知识
    summary:
      _type: str
      _desc: 知识概要
    entities:
      _type: list
      _desc: 包含的实体
      _item:
        _type: str
    relations:
      _type: list
      _desc: 实体之间存在的关系
      _item:
        _type: str
    exceptions:
      _type: list
      _desc: 额外强调的事件
      _item:
        _type: str
    capability_questions:
      _type: list
      _desc: 基于知识可以回答的问题
      _item:
        _type: str
    source_excerpt:
      _type: str
      _desc: 关联的原文片段
output:
  mode: json
  schema:
    answer:
      _type: str
      _desc: 回答内容
    confidence:
      _type: float
      _desc: 置信度，范围 0~1
    analysis:
      _type: str
      _desc: 分析过程概要
