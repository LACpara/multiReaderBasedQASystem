title: 知识抽取提示词模板
author: LACpara
email: 2797157434@qq.com
last_modified: 2026-06-16
version: 1.0
tags: []
description: 根据提供的文本片段提取可表示的知识
param:
  name:
    _type: str
    _desc: 输入的长篇文本内容
output:
  mode: json
  schema:
    summary:
      _type: str
      _desc: 对知识的总结
    entities:
      _type: list
      _desc: 文本片段中可提取的实体
      _item:
        _type: str
    relations:
      _type: list
      _desc: 实体之间的关系描述
      _item:
        _type: str
    exceptions:
      _type: list
      _desc: 额外强调的事件
      _item:
        _type: str